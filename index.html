<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>恋愛こじらせ沼 脱出診断</title>
    <!-- Google Fonts: Zen Kaku Gothic New -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Depth Layers -->
    <div class="bg-container">
        <!-- スタート画面ではmain.png、結果画面ではタイプ別画像をJSで切り替える -->
        <img id="main-bg-img" src="images/main.jpg" alt="" class="bg-image">
        <div class="bg-overlay"></div>
    </div>

    <div id="app">
        <!-- スタート画面 -->
        <section id="start-screen" class="screen active">
            <div class="glass-card start-content">
                <span class="label">Nighttime Thoughts</span>
                <h1 class="main-title">あなたの<br>「恋愛こじらせ沼」<br>脱出診断</h1>
                <p class="description">夜になると急に不安になる…。<br>ぐるぐると同じことで悩んでしまう…。<br><br>たった8問の質問で、今のあなたの「こじらせ度」と、心をスッと軽くする最適な方法を診断します。</p>
                <div class="time-est">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    所要時間：約1分
                </div>
                <button id="start-btn" class="btn-primary">診断をはじめる</button>
            </div>
        </section>

        <!-- 質問画面 -->
        <section id="question-screen" class="screen hidden">
            <div class="glass-card">
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div class="progress-text">Q.<span id="current-q-num">1</span></div>
                
                <h2 id="question-text" class="question-text"></h2>
                
                <div id="options-container" class="options-container">
                    <!-- 選択肢がJavaScriptで生成されます -->
                </div>
                
                <button id="back-btn" class="btn-text">← 前の質問に戻る</button>
            </div>
        </section>

        <!-- 結果画面 -->
        <section id="result-screen" class="screen hidden">
            <div class="result-header">
                YOUR RESULT
            </div>

            <!-- タイプ別のアイキャッチ画像 -->
            <div class="result-image-wrapper">
                <img id="result-type-img" src="" alt="診断結果イメージ">
                <div class="result-image-overlay"></div>
            </div>
            
            <h2 id="result-title" class="result-title"></h2>

            <div class="glass-card result-card">
                
                <div class="result-section empathy">
                    <h3>💭 あなたの現状</h3>
                    <p id="result-empathy"></p>
                </div>

                <div class="result-section solution">
                    <h3>💡 沼から抜け出すには？</h3>
                    <p id="result-solution"></p>
                </div>

                <div class="result-section recommendation">
                    <h3>🔮 そんなあなたに…</h3>
                    <p id="result-recommendation"></p>
                    <div class="reason-box">
                        <h4>おすすめする理由</h4>
                        <p id="result-reason"></p>
                    </div>
                </div>
            </div>

            <!-- CTA（アフィリエイトリンクへの導線） -->
            <div class="cta-area">
                <div class="microcopy">＼ 初回特典でお得に相談 ／</div>
                <a href="#" id="cta-button" class="btn-cta" target="_blank" rel="noopener"></a>
            </div>

            <!-- シェアエリア -->
            <div class="share-area">
                <p class="share-text">結果をスクショして<br>Threadsでシェアしよう！</p>
                <button id="copy-url-btn" class="btn-share">🔗 診断のURLをコピーする</button>
            </div>

            <button id="restart-btn" class="btn-text mt-4">↻ 最初からやり直す</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
